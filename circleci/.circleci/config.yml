version: 2.1

orbs:
  chalk: crashappsec/chalk@dev:<<pipeline.git.revision>>
  orb-tools: circleci/orb-tools@12.0

filters: &filters
  tags:
    only: /.*/

release-filters: &release-filters
  branches:
    ignore: /.*/
  tags:
    only: /^v[0-9]+\.[0-9]+\.[0-9]+$/

jobs:
  integration-test:
    docker:
      - image: cimg/base:current
    steps:
      - chalk/install:
          version: "0.6.5"
          use_cache: false
      - run:
          name: Verify chalk
          command: |
            chalk --version
            which chalk

workflows:
  test-deploy:
    jobs:
      - integration-test:
          filters: *filters
      - orb-tools/pack:
          filters: *filters
      - orb-tools/publish:
          orb_name: crashappsec/chalk
          vcs_type: << pipeline.project.type >>
          pub_type: production
          requires:
            - orb-tools/pack
            - integration-test
          context: orb-publishing
          filters: *release-filters
