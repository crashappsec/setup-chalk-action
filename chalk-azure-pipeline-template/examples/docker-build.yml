# PoC: templates are in the nettrino/expandbuildpipes branch of setup-chalk-action.
# Requires a GitHub service connection named 'github-crashappsec' in your Azure DevOps project.
# Production: switch type to 'git', point at an Azure Repos project, and remove endpoint.
resources:
  repositories:
    - repository: chalk-templates
      type: github
      name: crashappsec/setup-chalk-action
      ref: refs/heads/nettrino/expandbuildpipes
      endpoint: github-crashappsec

variables:
  - group: chalk-secrets

trigger:
  - main

extends:
  template: chalk-azure-pipeline-template/templates/chalk-job.yml@chalk-templates
  parameters:
    chalkVersion: '0.6.5'
    chalkConnect: true
    buildSteps:
      - script: docker build -t myapp:$(Build.BuildId) .
        displayName: Docker Build
      - script: docker push myapp:$(Build.BuildId)
        displayName: Docker Push
